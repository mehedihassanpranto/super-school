<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="./style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Ephesis&family=Kanit:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet">

    <title>Super School</title>
</head>
<body>
    <h1>Hello, World!</h1>


    <div class="left">
    <div class="logo">Super School</div>

    <h1>Login to Your Account</h1>

    <input type="user-id" name="user-id" id="user-id" placeholder="User ID">
    <input type="password" name="password" id="password" placeholder="Password">

    <button onclick="handleLogin()" class="btn-signin">Sign In</button>
  </div>

  <!-- Right Side -->
  <div class="right">
    <h2>New Here?</h2>
    <p>Sign up and discover a great amount of new opportunities!</p>
    <button class="btn-signup">Sign Up</button>
  </div>

</div>

<script src="./JS/login.js"></script>
</body>
</html>
